name: ML-CI-CD

on:
  push:
    branches:
      - main

jobs:

  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: python scripts/train.py

      - uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

  deploy:
    needs: train
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
            echo "Listing files..."
            ls -la
            docker build . -t reshma1204/lab4-api:${{ github.run_number }}
  
      - name: Push Image
        run: docker push reshma1204/lab4-api:${{ github.run_number }}